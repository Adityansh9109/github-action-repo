name: Hello Word

on:
  push:
    branches: [main]

jobs:
    greets:
        runs-on: ubuntu-latest
        steps:
            - name: say hello
              run: echo "hello"

            - name: say hello to every everyone
              run: echo "hello evryone"

    details:
        runs-on: ubuntu-latest
        steps:
            - name: show what is the version of python,docker ,etc
              run: docker --version && python --version
            - name: update the file 
              run: sudo apt-get update
    test:
      runs-on: ubuntu-latest
      steps:
          - name: show the date and time
            run: date
          - name: print branch name 
            run: echo " branch name is ${{github.ref_name}}
          - name: list of repo 
            run: ls -la


          
